services:
  eureka-server:
    build: ./apps/eureka-server
    image: eureka-server
    ports:
      - 8761:8761

  config-server:
    build: ./apps/config-server
    image: config-server
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    command:
      ["./wait-for-it.sh", "eureka:8761", "--", "java", "-jar","/app.jar"]
    depends_on:
      - eureka-server


  user-service:
    build: ./apps/user-service
    image: user-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - config-server

  template-service:
    build: ./apps/template-service
    image: template-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - config-server

  achievement-service:
    build: ./apps/achievement-service
    image: achievement-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    ports:
      - 8080:8080
    depends_on:
      - eureka-server
      - config-server