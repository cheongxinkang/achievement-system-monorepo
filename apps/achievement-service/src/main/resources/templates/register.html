<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Achievement System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <style>
        .register-box {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-color);
            color: var(--error-color);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app-container app-container-small">
    <h2>Create Account</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2.5rem;">Join the Achievement System today.</p>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" class="register-box">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password" />
        </div>
        <div style="margin-top: 2rem;">
            <button type="submit" style="width: 100%;">Sign Up</button>
        </div>
    </form>
    
    <div style="margin-top: 2rem; text-align: center;">
        <span style="color: var(--text-muted); font-size: 0.9rem;">Already have an account? </span>
        <a th:href="@{/login}" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Sign In</a>
    </div>
</div>
</body>
</html>
